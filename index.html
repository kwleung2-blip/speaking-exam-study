<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phonics Flashcards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #f1f5f9;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .perspective-container {
            perspective: 1200px;
        }

        .card-face {
            backface-visibility: hidden;
            transform-style: preserve-3d;
            transform-origin: 50% 24px; 
            will-change: transform;
        }

        .binder-ring {
            box-shadow: 2px 4px 6px rgba(0,0,0,0.3), inset 1px 2px 2px rgba(255,255,255,0.8);
        }
        
        #lessonGrid::-webkit-scrollbar { display: none; }
        #homeView {
            height: 100vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .no-select {
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body class="flex flex-col items-center relative overflow-hidden bg-[#f1f5f9]">

    <!-- ================= Home View ================= -->
    <div id="homeView" class="w-full flex flex-col items-center py-8 transition-all duration-500">
        <div class="text-center mb-10 px-4">
            <h1 class="text-4xl md:text-5xl font-bold text-indigo-900 mb-4">
                <i class="fa-solid fa-shapes text-yellow-500 mr-2"></i> Phonics Flashcards
            </h1>
            <p class="text-lg text-slate-600 font-medium">Select a word family to start learning!</p>
        </div>
        
        <!-- Term Selection Menu -->
        <div id="termTabs" class="flex flex-wrap justify-center gap-3 md:gap-6 mb-8 px-4 w-full max-w-3xl"></div>

        <div id="lessonGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 w-full max-w-5xl px-6 pb-24"></div>
    </div>

    <!-- ================= Flashcard View ================= -->
    <div id="flashcardView" class="hidden w-full h-full flex flex-col items-center justify-center py-4 md:py-8 transition-all duration-500 opacity-0 no-select">
        
        <div class="w-full max-w-3xl flex items-center justify-between mb-6 md:mb-10 gap-4 px-6">
            <button onclick="goHome()" class="bg-white text-indigo-600 border-2 border-indigo-100 font-bold py-3 px-6 rounded-2xl text-lg shadow-sm active:scale-95 flex items-center gap-2">
                <i class="fa-solid fa-house"></i> Back
            </button>
            <h2 id="currentLessonTitle" class="text-xl md:text-3xl font-bold text-indigo-900 bg-white/50 px-4 py-2 rounded-xl backdrop-blur-sm">Set</h2>
        </div>

        <div id="touchArea" class="bg-[#3e1b6b] p-6 md:p-12 rounded-[2.5rem] shadow-2xl relative w-[92%] max-w-3xl flex justify-center gap-2 md:gap-8 border-b-[12px] border-[#2a104f] touch-none">
            <div class="absolute inset-0 overflow-hidden rounded-[2.5rem] opacity-20 pointer-events-none">
                <i class="fa-solid fa-star absolute top-6 left-10 text-4xl text-white"></i>
                <i class="fa-solid fa-rocket absolute bottom-10 right-10 text-5xl text-white"></i>
            </div>

            <!-- Left Card -->
            <div class="relative w-32 sm:w-48 md:w-56 h-52 sm:h-72 md:h-[22rem] perspective-container z-10">
                <div class="absolute inset-0 bg-[#5271ff] rounded-2xl flex flex-col items-center justify-center shadow-md border-b-[6px] border-[#3752ca]">
                    <span id="onsetBottom" class="text-white text-[4rem] sm:text-[6rem] md:text-[8rem] font-bold pb-6"></span>
                </div>
                <div id="onsetTop" class="card-face absolute inset-0 bg-[#5271ff] rounded-2xl flex flex-col items-center justify-center shadow-lg border-b-[6px] border-[#3752ca] z-20">
                    <span id="onsetText" class="text-white text-[4rem] sm:text-[6rem] md:text-[8rem] font-bold pb-6"></span>
                </div>
                <div class="absolute top-4 left-4 md:left-10 z-30">
                    <div class="binder-ring w-3 md:w-4 h-12 md:h-16 border-[4px] md:border-[5px] border-[#ffde00] rounded-full absolute -top-10 -left-2"></div>
                </div>
                <div class="absolute top-4 right-4 md:right-10 z-30">
                    <div class="binder-ring w-3 md:w-4 h-12 md:h-16 border-[4px] md:border-[5px] border-[#ffde00] rounded-full absolute -top-10 -left-2"></div>
                </div>
            </div>

            <!-- Right Card -->
            <div class="relative w-36 sm:w-56 md:w-64 h-52 sm:h-72 md:h-[22rem] z-10">
                <div class="absolute inset-0 bg-[#ff5277] rounded-2xl flex flex-col items-center justify-center shadow-md border-b-[6px] border-[#d43758]">
                    <span id="rimeText" class="text-white text-[3rem] sm:text-[5rem] md:text-[6rem] font-bold pb-6 tracking-tight text-center px-2"></span>
                </div>
                <div class="absolute top-4 left-6 md:left-12 z-30">
                    <div class="binder-ring w-3 md:w-4 h-12 md:h-16 border-[4px] md:border-[5px] border-[#ffde00] rounded-full absolute -top-10 -left-2"></div>
                </div>
                <div class="absolute top-4 right-6 md:right-12 z-30">
                    <div class="binder-ring w-3 md:w-4 h-12 md:h-16 border-[4px] md:border-[5px] border-[#ffde00] rounded-full absolute -top-10 -left-2"></div>
                </div>

                <button onclick="speakCurrentWord()" class="absolute -right-4 md:-right-8 top-1/2 -translate-y-1/2 w-16 h-16 md:w-20 md:h-20 bg-yellow-400 rounded-full shadow-lg border-4 border-white flex items-center justify-center text-white text-3xl md:text-4xl z-40 active:scale-90 transition-transform">
                    <i class="fa-solid fa-volume-high"></i>
                </button>
            </div>
        </div>

        <div class="flex gap-6 md:gap-12 mt-10">
            <button onclick="prevCard()" class="bg-white text-indigo-600 border-2 border-indigo-100 font-bold py-5 px-8 rounded-3xl text-2xl transition-all shadow-sm active:scale-90 flex items-center gap-3">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <button onclick="nextCard()" class="bg-indigo-500 text-white font-bold py-5 px-16 rounded-3xl text-2xl transition-all shadow-md active:scale-90 border-b-4 border-indigo-700 active:border-b-0">
                Next <i class="fa-solid fa-chevron-right ml-2"></i>
            </button>
        </div>
        <p class="mt-8 text-slate-400 font-medium animate-pulse">Swipe left or right to flip the cards!</p>
    </div>

            { title: "focus on wr-", preview: "wrong, write, wrote, wrist...", words: [{o: "wr", r: "ong"}, {o: "wr", r: "ite"}, {o: "wr", r: "ote"}, {o: "wr", r: "ist"}, {o: "wr", r: "ath"}] },
            { title: "focus on y", preview: "year, you, yummy, yuck, yard", words: [{o: "y", r: "ear"}, {o: "y", r: "ou"}, {o: "y", r: "ummy"}, {o: "y", r: "uck"}, {o: "y", r: "ard"}] },
            { title: "focus on -y", preview: "very, fairy, slowly, quickly...", words: [{o: "ver", r: "y"}, {o: "fair", r: "y"}, {o: "slowl", r: "y"}, {o: "quickl", r: "y"}, {o: "smoothl", r: "y"}, {o: "extremel", r: "y"}] },
            { title: "focus on s-", preview: "sad, set, sit, sure, sob, save", words: [{o: "s", r: "ad"}, {o: "s", r: "et"}, {o: "s", r: "it"}, {o: "s", r: "ure"}, {o: "s", r: "ob"}, {o: "s", r: "ave"}] },
            { title: "focus on ce-", preview: "cell, centre, cereal, ceiling...", words: [{o: "ce", r: "ll"}, {o: "ce", r: "ntre"}, {o: "ce", r: "real"}, {o: "ce", r: "iling"}, {o: "ce", r: "rtify"}, {o: "ce", r: "rtificate"}] },
            { title: "focus on -ce", preview: "ace, sentence, space, place", words: [{o: "a", r: "ce"}, {o: "senten", r: "ce"}, {o: "spa", r: "ce"}, {o: "pla", r: "ce"}] },
            { title: "focus on -se", preview: "cause, case, advise", words: [{o: "cau", r: "se"}, {o: "ca", r: "se"}, {o: "advi", r: "se"}] },
            { title: "focus on z-", preview: "zebra, zombie, zone, zero...", words: [{o: "z", r: "ebra"}, {o: "z", r: "ombie"}, {o: "z", r: "one"}, {o: "z", r: "ero"}, {o: "z", r: "oo"}, {o: "z", r: "ip"}, {o: "z", r: "oom"}] },
            { title: "focus on sh-", preview: "shark, sheep, ship, shut...", words: [{o: "sh", r: "ark"}, {o: "sh", r: "eep"}, {o: "sh", r: "ip"}, {o: "sh", r: "ut"}, {o: "sh", r: "arp"}, {o: "sh", r: "e"}, {o: "sh", r: "oe"}, {o: "sh", r: "ow"}] }
        ];

        // Terms Data Structure
        const termsData = [
            { name: "Term 1", lessons: term1Lessons },
            { name: "Term 2", lessons: term2Lessons },
            { name: "Term 3", lessons: originalLessons } // Put the existing 44 sets into Term 3
        ];

        let currentTermIndex = 0; // Default to Term 1
        let currentLessonIndex = 0;
        let currentWordIndex = 0;
        let isAnimating = false;

        const homeView = document.getElementById('homeView');
        const flashcardView = document.getElementById('flashcardView');
        const lessonGrid = document.getElementById('lessonGrid');
        const currentLessonTitle = document.getElementById('currentLessonTitle');
        const onsetTop = document.getElementById('onsetTop');
        const onsetText = document.getElementById('onsetText');
        const onsetBottom = document.getElementById('onsetBottom');
        const rimeText = document.getElementById('rimeText');
        const touchArea = document.getElementById('touchArea');

        let voices = [];
        function loadVoices() { voices = window.speechSynthesis.getVoices(); }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function speakCurrentWord() {
            const wordObj = termsData[currentTermIndex].lessons[currentLessonIndex].words[currentWordIndex];
            const originalText = wordObj.o + wordObj.r;
            
            // Add space before 'h' for better pronunciation
            let textToSpeak = originalText;
            if (originalText.toLowerCase().startsWith('h')) {
                textToSpeak = " " + originalText; 
            }

            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'en-GB';
            
            // Prefer high-quality UK voices
            const britishVoice = voices.find(v => v.lang === 'en-GB' && v.name.includes('Daniel'))
                                || voices.find(v => v.lang === 'en-GB' && v.name.includes('Serena'))
                                || voices.find(v => v.lang === 'en-GB' && v.name.includes('Google'))
                                || voices.find(v => v.lang === 'en-GB')
                                || voices.find(v => v.lang.startsWith('en'));
            
            if (britishVoice) utterance.voice = britishVoice;
            
            utterance.rate = 0.8;  
            utterance.pitch = 0.9; 
            window.speechSynthesis.speak(utterance);
        }

        let touchStartX = 0;
        touchArea.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
        touchArea.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 50) nextCard();
            if (touchEndX - touchStartX > 50) prevCard();
        }, {passive: true});

        function renderTabs() {
            const tabsContainer = document.getElementById('termTabs');
            tabsContainer.innerHTML = '';
            termsData.forEach((term, index) => {
                const btn = document.createElement('button');
                const isActive = index === currentTermIndex;
                btn.className = `px-6 md:px-8 py-2 md:py-3 rounded-full font-bold text-lg transition-all shadow-sm ${isActive ? 'bg-indigo-600 text-white shadow-md transform scale-105' : 'bg-white text-indigo-500 border-2 border-indigo-100 hover:bg-indigo-50'}`;
                btn.textContent = term.name;
                btn.onclick = () => {
                    currentTermIndex = index;
                    renderTabs();
                    renderLessons();
                };
                tabsContainer.appendChild(btn);
            });
        }

        function renderLessons() {
            lessonGrid.innerHTML = '';
            const lessons = termsData[currentTermIndex].lessons;
            
            if (lessons.length === 0) {
                lessonGrid.innerHTML = `<div class="col-span-full text-center text-slate-400 font-medium py-12 text-xl">No data available for this term yet (Coming Soon)</div>`;
                return;
            }

            lessons.forEach((lesson, index) => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-3xl shadow-sm border-2 border-slate-100 active:bg-indigo-50 cursor-pointer transition-all text-center";
                card.onclick = () => openLesson(index);
                card.innerHTML = `
                    <div class="w-16 h-16 mx-auto bg-indigo-50 text-indigo-500 rounded-2xl flex items-center justify-center text-2xl font-bold mb-4">
                        ${index + 1}
                    </div>
                    <h3 class="text-xl font-bold text-slate-800 mb-2">${lesson.title}</h3>
                    <p class="text-slate-500 font-medium leading-relaxed">${lesson.preview}</p>
                `;
                lessonGrid.appendChild(card);
            });
        }

        function initHome() {
            renderTabs();
            renderLessons();
        }

        function openLesson(index) {
            currentLessonIndex = index;
            currentWordIndex = 0;
            currentLessonTitle.textContent = termsData[currentTermIndex].lessons[index].title;
            homeView.classList.add('hidden', 'opacity-0');
            flashcardView.classList.remove('hidden');
            setTimeout(() => flashcardView.classList.remove('opacity-0'), 50);
            updateDisplayInstant();
        }

        function goHome() {
            flashcardView.classList.add('opacity-0');
            window.speechSynthesis.cancel();
            setTimeout(() => {
                flashcardView.classList.add('hidden');
                homeView.classList.remove('hidden');
                setTimeout(() => homeView.classList.remove('opacity-0'), 50);
            }, 500);
        }

        function updateDisplayInstant() {
            const word = termsData[currentTermIndex].lessons[currentLessonIndex].words[currentWordIndex];
            rimeText.textContent = word.r;
            onsetText.textContent = word.o;
            onsetBottom.textContent = word.o;
            onsetTop.style.transition = 'none';
            onsetTop.style.transform = 'rotateX(0deg)';
            onsetTop.style.opacity = '1';
        }

        function nextCard() {
            if (isAnimating) return;
            isAnimating = true;
            const words = termsData[currentTermIndex].lessons[currentLessonIndex].words;
            const nextIndex = (currentWordIndex + 1) % words.length;
            const nextWord = words[nextIndex];
            onsetBottom.textContent = nextWord.o;
            onsetTop.style.transition = "transform 0.4s ease-in, opacity 0.2s 0.2s";
            onsetTop.style.transform = "rotateX(110deg)";
            onsetTop.style.opacity = "0";
            setTimeout(() => { rimeText.textContent = nextWord.r; }, 150);
            setTimeout(() => {
                currentWordIndex = nextIndex;
                onsetTop.style.transition = "none";
                onsetTop.style.transform = "rotateX(0deg)";
                onsetTop.style.opacity = "1";
                onsetText.textContent = nextWord.o;
                isAnimating = false;
            }, 450);
        }

        function prevCard() {
            if (isAnimating) return;
            isAnimating = true;
            const words = termsData[currentTermIndex].lessons[currentLessonIndex].words;
            const prevIndex = (currentWordIndex - 1 + words.length) % words.length;
            const prevWord = words[prevIndex];
            onsetBottom.textContent = words[currentWordIndex].o;
            onsetTop.style.transition = "none";
            onsetTop.style.transform = "rotateX(110deg)";
            onsetTop.style.opacity = "0";
            onsetText.textContent = prevWord.o;
            rimeText.textContent = prevWord.r;
            void onsetTop.offsetWidth;
            onsetTop.style.transition = "transform 0.4s ease-out, opacity 0.2s";
            onsetTop.style.transform = "rotateX(0deg)";
            onsetTop.style.opacity = "1";
            setTimeout(() => {
                currentWordIndex = prevIndex;
                onsetBottom.textContent = prevWord.o;
                isAnimating = false;
            }, 450);
        }

        initHome();
    </script>
</body>
</html>
